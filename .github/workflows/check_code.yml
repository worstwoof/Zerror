name: check_code

on:
  push:
    branches:
      - main
      - zander
      - test
  pull_request:
    branches:
      - main
      - zander
      - test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m compileall -q backend ai_engine scripts

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze Flutter code
        working-directory: frontend
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
